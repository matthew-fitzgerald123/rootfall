# Zone 2: Earthmoving.
#
# The player learns to shape the tree: make, copy, move, link, and destroy.
# Runes are slotted onto the base commands. The boss is a build: the setup is the
# lesson, so the player constructs a nested cell block and symlinks a prisoner.
#
# GNU/Linux flag forms throughout.

id: zone02_earthmoving
name: Earthmoving
path: /var
theme: Shaping the tree. mkdir, touch, cp, mv, rm, ln.
commands:
  - mkdir
  - touch
  - cp
  - mv
  - rm
  - ln

encounters:
  - type: villager
    name: The Groundbreaker
    lore: >-
      A mason caked in soil leans on a spade. "Anyone can dig one hole," he says.
      "The runes let you carve a whole warren at once, haul rooms about, and bind
      one place to another." He teaches you to move earth without breaking your
      back.
    teaches:
      - command: "mkdir -p"
        desc: "create a directory and any missing parents in one stroke"
      - command: "cp -r"
        desc: "copy a directory and everything inside it, recursively"
      - command: "rm -rf"
        desc: "remove a tree forcibly, no prompts (aim carefully)"
      - command: "mv"
        desc: "move or rename in a single step"
      - command: "ln -s"
        desc: "make a symbolic link, a signpost to another path"
      - command: "touch"
        desc: "create an empty file or update its timestamp"
    quizzes:
      - prompt: "Which flag tells mkdir to build all missing parent directories at once?"
        answers:
          - "mkdir -p"
          - "-p"
      - prompt: "Which cp flag copies a directory tree recursively?"
        answers:
          - "cp -r"
          - "cp -R"
          - "-r"
          - "-R"
      - prompt: "Which rm flags forcibly remove a directory tree with no prompts?"
        answers:
          - "rm -rf"
          - "-rf"
      - prompt: "Which command moves or renames a file or directory in a single step?"
        answers:
          - "mv"
      - prompt: "Which ln flag creates a symbolic link rather than a hard link?"
        answers:
          - "ln -s"
          - "-s"
      - prompt: "Which command creates an empty file or updates an existing file's timestamp?"
        answers:
          - "touch"

  - type: recall
    prompt: "Create the nested path a/b/c in a single command."
    answers:
      - "mkdir -p a/b/c"
    time_limit: 8

  - type: recall
    prompt: "Create an empty file named notes.txt."
    answers:
      - "touch notes.txt"
    time_limit: 7

  - type: recall
    prompt: "Copy the directory src and all its contents to dst."
    answers:
      - "cp -r src dst"
      - "cp -R src dst"
    time_limit: 8

  - type: recall
    prompt: "Rename old.txt to new.txt."
    answers:
      - "mv old.txt new.txt"
    time_limit: 7

  - type: recall
    prompt: "Forcibly remove the directory tree build and everything under it."
    answers:
      - "rm -rf build"
    time_limit: 8

  - type: recall
    prompt: "Make a symbolic link named link pointing at target."
    answers:
      - "ln -s target link"
    time_limit: 8

  - type: solve
    name: The Cell Block
    objective: >-
      Build a holding cell. With a single mkdir -p create
      world/var/cells/block-a/cell-3, place an empty prisoner.txt inside it with
      touch, then bind it to the surface with a symbolic link at
      world/var/escape.txt using ln -s.
    hint: "mkdir -p <path> ; touch <path>/<file> ; ln -s <target> <linkname>"
    key: "mkdir -p"
